name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (Bulletproof Auto-Detect)
      run: |
        # 1. Find the actual Android project folder automatically
        PROJECT_DIR=$(dirname $(find . -maxdepth 2 -name "settings.gradle*" | head -n 1))
        echo "Found Android project at: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # 2. If the zip file deleted the gradlew file, regenerate it
        if [ ! -f "gradlew" ]; then
          echo "gradlew is missing. Generating a fresh one..."
          gradle wrapper
        fi
        
        # 3. GENERATE THE MISSING KEYSTORE
        echo "Generating a fresh debug.keystore so Android allows the build..."
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
        
        # 4. Grant permissions and build
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: StandBy-App-APK
        path: "**/app/build/outputs/apk/debug/app-debug.apk"
